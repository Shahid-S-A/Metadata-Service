version: '3.8'

services:
  mysql:
    image: mysql:8.0-alpine
    container_name: metadata_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: metadata_user
      MYSQL_PASSWORD: metadata_password
      MYSQL_DATABASE: metadata_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: metadata_api
    environment:
      DATABASE_URL: mysql+pymysql://metadata_user:metadata_password@mysql:3306/metadata_db
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  mysql_data:
